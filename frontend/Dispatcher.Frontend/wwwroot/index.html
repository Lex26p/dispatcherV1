<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dispatcher</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <section class="dispatcher-loading">
            <div class="dispatcher-loading__panel">
                <div class="dispatcher-loading__brand">
                    <div class="dispatcher-loading__mark">D</div>

                    <div>
                        <div class="dispatcher-loading__title">Dispatcher</div>
                        <div class="dispatcher-loading__subtitle">Операторский интерфейс SCADA</div>
                    </div>
                </div>

                <div class="dispatcher-loading__status">
                    <div class="dispatcher-loading__spinner" aria-hidden="true"></div>

                    <div>
                        <div class="dispatcher-loading__message">Загрузка интерфейса</div>
                        <div class="dispatcher-loading__hint">Подготовка рабочей области оператора...</div>
                    </div>
                </div>

                <div class="dispatcher-loading__bar">
                    <div class="dispatcher-loading__bar-fill"></div>
                </div>

                <div class="dispatcher-loading__footer">
                    <span>Frontend foundation</span>
                    <span>Post-MVP</span>
                </div>
            </div>
        </section>
    </div>

    <div id="blazor-error-ui">
        Произошла ошибка.
        <a href="" class="reload">Перезагрузить</a>
        <a class="dismiss">×</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
